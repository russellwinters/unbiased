version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --include=dev
        - npx prisma generate
        - npx prisma migrate deploy
    build:
      commands:
        - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
        - echo "DIRECT_DATABASE_URL=$DIRECT_DATABASE_URL" >> .env.production
        - echo "CRON_SECRET=$CRON_SECRET" >> .env.production
        - echo "NODE_ENV=$NODE_ENV" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
